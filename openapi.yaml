components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Bearer
  parameters:
    ApiTokenQuery:
      name: apiToken
      in: query
      description: Token d'API alternatif lorsque Authorization n'est pas fourni
      required: false
      schema:
        type: string
  schemas:
    RegisterRequest:
      type: object
      required:
        - pseudo
        - mail
        - password
        - passwordConfirm
      properties:
        pseudo:
          type: string
          example: user123
        mail:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: password123
        passwordConfirm:
          type: string
          format: password
          example: password123
    RegisterResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        apiToken:
          type: string
          example: abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
    LoginRequest:
      type: object
      required:
        - mail
        - password
      properties:
        mail:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: password123
    LoginResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        apiToken:
          type: string
          example: abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
    MeResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        pseudo:
          type: string
          example: user123
        mail:
          type: string
          format: email
          example: user@example.com
    UpdateMeRequest:
      type: object
      properties:
        pseudo:
          type: string
          example: user123
        mail:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: newPassword123
        passwordConfirm:
          type: string
          format: password
          example: newPassword123
    CreateCardRequest:
      type: object
      required:
        - name
        - extension
        - number
        - gameTypeId
      properties:
        name:
          type: string
          example: Pikachu
        extension:
          type: string
          example: Base
        number:
          type: string
          example: "001"
        image:
          type: string
          format: uri
          nullable: true
          example: https://example.com/image.png
        gameTypeId:
          type: integer
          example: 1
    UpdateCardRequest:
      type: object
      properties:
        name:
          type: string
          example: Pikachu
        extension:
          type: string
          example: Base
        number:
          type: string
          example: "001"
        image:
          type: string
          format: uri
          nullable: true
          example: https://example.com/image.png
        gameTypeId:
          type: integer
          example: 1
    CardResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Pikachu
        extension:
          type: string
          example: Base
        number:
          type: string
          example: "001"
        image:
          type: string
          format: uri
          nullable: true
          example: https://example.com/image.png
        gameType:
          $ref: '#/components/schemas/GameTypeSummary'
        numberCard:
          type: integer
          description: Nombre d'exemplaires dans la bibliothèque de l'utilisateur (présent uniquement si authentifié et carte possédée)
          example: 3
        isFavorite:
          type: boolean
          description: Indique si la carte est en favori dans la bibliothèque (présent uniquement si authentifié et carte possédée)
          example: true
    CardsListResponse:
      type: object
      properties:
        cards:
          type: array
          items:
            $ref: '#/components/schemas/CardResponse'
        pagination:
          $ref: '#/components/schemas/Pagination'
    GameTypeSummary:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nom:
          type: string
          example: Pokemon
    SetSummary:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Deck jaune
        color:
          type: string
          example: "#FFEA00"
        gameType:
          $ref: '#/components/schemas/GameTypeSummary'
    CreateSetRequest:
      type: object
      required:
        - name
        - gameTypeId
      properties:
        name:
          type: string
          example: Set A
        gameTypeId:
          type: integer
          example: 1
        color:
          type: string
          description: Couleur hexadécimale (#RRGGBB)
          example: "#FFFFFF"
    UpdateSetRequest:
      type: object
      properties:
        name:
          type: string
          example: Set A
        gameTypeId:
          type: integer
          example: 1
        color:
          type: string
          description: Couleur hexadécimale (#RRGGBB)
          example: "#FFFFFF"
    CreateGameTypeRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Pokemon
    GameTypeResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Pokemon
    AddCardToSetRequest:
      type: object
      required:
        - cardId
      properties:
        cardId:
          type: integer
          example: 10
    AddCardToLibraryRequest:
      type: object
      required:
        - cardId
      properties:
        cardId:
          type: integer
          example: 10
        numberCard:
          type: integer
          minimum: 0
          default: 1
          example: 2
        isFavorite:
          type: boolean
          default: false
          example: true
    UpdateLibraryCardRequest:
      type: object
      properties:
        numberCard:
          type: integer
          minimum: 0
          example: 3
        isFavorite:
          type: boolean
          example: true
    AddUserCardRequest:
      type: object
      required:
        - name
        - extension
        - number
        - gameTypeId
        - libraryId
      properties:
        name:
          type: string
          example: Pikachu
        extension:
          type: string
          example: Base
        number:
          type: string
          example: "001"
        image:
          type: string
          format: uri
          nullable: true
          example: https://example.com/image.png
        gameTypeId:
          type: integer
          example: 1
        libraryId:
          type: integer
          example: 1
        numberCard:
          type: integer
          minimum: 0
          default: 1
          example: 2
        isFavorite:
          type: boolean
          default: false
          example: true
    AddUserCardListRequest:
      type: object
      required:
        - cards
      properties:
        cards:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/AddUserCardRequest'
    AddUserCardResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Pikachu
        extension:
          type: string
          example: Base
        number:
          type: string
          example: "001"
        image:
          type: string
          format: uri
          nullable: true
          example: https://example.com/image.png
        uuid:
          type: string
          example: pikachu_001_base
        numberCard:
          type: integer
          example: 2
        isFavorite:
          type: boolean
          example: true
        gameType:
          $ref: '#/components/schemas/GameTypeSummary'
    AddUserCardListResponse:
      type: object
      properties:
        cards:
          type: array
          items:
            $ref: '#/components/schemas/AddUserCardResponse'
        count:
          type: integer
          example: 2
        created:
          type: integer
          description: Nombre de cartes globales créées
          example: 1
        existing:
          type: integer
          description: Nombre de cartes globales déjà existantes mais ajoutées à la bibliothèque
          example: 1
    LibraryCardResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Pikachu
        extension:
          type: string
          example: Base
        number:
          type: string
          example: "001"
        image:
          type: string
          format: uri
          nullable: true
          example: https://example.com/image.png
        numberCard:
          type: integer
          example: 2
        isFavorite:
          type: boolean
          example: true
        gameType:
          $ref: '#/components/schemas/GameTypeSummary'
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Operation completed successfully
    LibraryResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
        sets:
          type: array
          items:
            $ref: '#/components/schemas/SetSummary'
        cards:
          type: array
          items:
            $ref: '#/components/schemas/LibraryCardResponse'
        pagination:
          $ref: '#/components/schemas/Pagination'
    LibrarySearchResponse:
      type: object
      properties:
        query:
          type: string
          example: Pikachu
        sets:
          type: array
          items:
            $ref: '#/components/schemas/SetSummary'
        cards:
          type: array
          items:
            $ref: '#/components/schemas/LibraryCardResponse'
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        perPage:
          type: integer
          example: 25
        total:
          type: integer
          example: 100
        pages:
          type: integer
          example: 4
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Missing fields
    ErrorWithIndexResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            index:
              type: integer
              description: Index de la carte en erreur dans le tableau envoyé
              example: 0
