openapi: 3.0.3
info:
  title: Pafodex Backend API
  version: 1.0.0
  description: |
    Documentation Swagger de l'API Pafodex.
    Les endpoints exposés sont détaillés avec les payloads, paramètres, réponses et pagination.
servers:
  - url: /
    description: Serveur courant
  - url: https://pafodex-backend.onrender.com
    description: Serveur Render
paths:
  /api/register:
    post:
      tags:
        - Auth
      summary: Enregistrer un nouvel utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Utilisateur créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Requête invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email déjà utilisé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/login:
    post:
      tags:
        - Auth
      summary: Authentifier un utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentification réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Requête invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Identifiants invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/logout:
    post:
      tags:
        - Auth
      summary: Déconnecter l'utilisateur
      description: |
        Le token peut être fourni dans l'en-tête Authorization: Bearer <token>
        ou en query paramètre apiToken.
      parameters:
        - $ref: '#/components/parameters/ApiTokenQuery'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Déconnexion réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/me:
    get:
      tags:
        - Auth
      summary: Récupérer les informations de l'utilisateur connecté
      description: |
        Le token peut être fourni dans l'en-tête Authorization: Bearer <token>
        ou en query paramètre apiToken.
      parameters:
        - $ref: '#/components/parameters/ApiTokenQuery'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Informations utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Auth
      summary: Mettre à jour l'utilisateur connecté
      description: |
        Le token peut être fourni dans l'en-tête Authorization: Bearer <token>
        ou en query paramètre apiToken.
      parameters:
        - $ref: '#/components/parameters/ApiTokenQuery'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '200':
          description: Utilisateur mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '400':
          description: Requête invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email déjà utilisé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Auth
      summary: Supprimer l'utilisateur connecté
      description: |
        Le token peut être fourni dans l'en-tête Authorization: Bearer <token>
        ou en query paramètre apiToken.
      parameters:
        - $ref: '#/components/parameters/ApiTokenQuery'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Utilisateur supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cards:
    get:
      tags:
        - Cards
      summary: Lister les cartes
      parameters:
        - name: page
          in: query
          description: Numéro de page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Nombre de cartes par page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Liste paginée des cartes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardsListResponse'
    post:
      tags:
        - Cards
      summary: Créer une carte
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCardRequest'
      responses:
        '201':
          description: Carte créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardResponse'
        '400':
          description: Requête invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: GameType introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cards/add-user-card:
    post:
      tags:
        - Cards
      summary: Ajouter une carte à la bibliothèque d'un utilisateur
      description: Crée ou rattache une carte existante à une bibliothèque.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddUserCardRequest'
      responses:
        '201':
          description: Carte créée et ajoutée à la bibliothèque
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddUserCardResponse'
        '200':
          description: Carte existante ajoutée à la bibliothèque
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddUserCardResponse'
        '400':
          description: Requête invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: GameType ou Library introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Carte déjà présente dans la bibliothèque
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cards/add-user-card/list:
    post:
      tags:
        - Cards
      summary: Ajouter plusieurs cartes à la bibliothèque d'un utilisateur
      description: |
        Crée ou rattache plusieurs cartes existantes à une bibliothèque.
        Le body peut être un objet avec une propriété cards, ou directement un tableau de cartes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/AddUserCardListRequest'
                - type: array
                  items:
                    $ref: '#/components/schemas/AddUserCardRequest'
            examples:
              objectPayload:
                summary: Objet avec propriété cards
                value:
                  cards:
                    - name: Pikachu
                      extension: Base
                      number: "001"
                      image: https://example.com/pikachu.png
                      gameTypeId: 1
                      libraryId: 1
                      numberCard: 2
                      isFavorite: true
                    - name: Charizard
                      extension: Base
                      number: "004"
                      image: https://example.com/charizard.png
                      gameTypeId: 1
                      libraryId: 1
                      numberCard: 1
                      isFavorite: false
              arrayPayload:
                summary: Tableau direct
                value:
                  - name: Pikachu
                    extension: Base
                    number: "001"
                    image: https://example.com/pikachu.png
                    gameTypeId: 1
                    libraryId: 1
                    numberCard: 2
                    isFavorite: true
      responses:
        '201':
          description: Cartes ajoutées à la bibliothèque
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddUserCardListResponse'
        '400':
          description: Requête invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorWithIndexResponse'
        '404':
          description: GameType ou Library introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorWithIndexResponse'
        '409':
          description: Carte déjà présente dans la bibliothèque ou doublon dans la requête
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorWithIndexResponse'
  /api/card/{id}:
    get:
      tags:
        - Cards
      summary: Récupérer une carte par ID
      parameters:
        - name: id
          in: path
          description: Identifiant de la carte
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Détails de la carte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardResponse'
        '404':
          description: Carte introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Cards
      summary: Mettre à jour une carte
      parameters:
        - name: id
          in: path
          description: Identifiant de la carte
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCardRequest'
      responses:
        '200':
          description: Carte mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardResponse'
        '400':
          description: Requête invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Carte ou GameType introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Cards
      summary: Supprimer une carte
      parameters:
        - name: id
          in: path
          description: Identifiant de la carte
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Suppression réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Carte introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/gametype:
    get:
      tags:
        - GameType
      summary: Lister tous les types de jeu
      responses:
        '200':
          description: Liste des types de jeu
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/GameTypeResponse'
    post:
      tags:
        - GameType
      summary: Créer un nouveau type de jeu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameTypeRequest'
      responses:
        '201':
          description: GameType créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameTypeResponse'
        '400':
          description: Requête invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/gametype/{id}:
    get:
      tags:
        - GameType
      summary: Récupérer un type de jeu par ID
      parameters:
        - name: id
          in: path
          description: Identifiant du type de jeu
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Détails du type de jeu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameTypeResponse'
        '404':
          description: GameType introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - GameType
      summary: Mettre à jour un type de jeu
      parameters:
        - name: id
          in: path
          description: Identifiant du type de jeu
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameTypeRequest'
      responses:
        '200':
          description: GameType mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameTypeResponse'
        '400':
          description: Requête invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: GameType introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - GameType
      summary: Supprimer un type de jeu par ID
      parameters:
        - name: id
          in: path
          description: Identifiant du type de jeu
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Suppression réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: GameType introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/me/library:
    get:
      tags:
        - Library
      summary: Récupérer la bibliothèque de l'utilisateur connecté
      description: |
        Le token peut être fourni dans l'en-tête Authorization: Bearer <token>
        ou en query paramètre apiToken.
      parameters:
        - $ref: '#/components/parameters/ApiTokenQuery'
        - name: page
          in: query
          description: Numéro de page pour la pagination des cartes
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Bibliothèque de l'utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryResponse'
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Bibliothèque introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/me/library/search:
    get:
      tags:
        - Library
      summary: Rechercher dans la bibliothèque de l'utilisateur connecté
      description: |
        Recherche les sets et les cartes de la bibliothèque connectée.
        Le token peut être fourni dans l'en-tête Authorization: Bearer <token>
        ou en query paramètre apiToken.
      parameters:
        - $ref: '#/components/parameters/ApiTokenQuery'
        - name: q
          in: query
          description: Texte recherché dans les noms de sets, noms de cartes, extensions, numéros et types de jeu
          required: true
          schema:
            type: string
            example: Pikachu
        - name: limit
          in: query
          description: Nombre maximum de sets et de cartes retournés
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Résultats de recherche
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibrarySearchResponse'
        '400':
          description: Paramètre de recherche manquant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Bibliothèque introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/me/library/cards:
    post:
      tags:
        - Library
      summary: Ajouter une carte existante à la bibliothèque connectée
      description: |
        Le token peut être fourni dans l'en-tête Authorization: Bearer <token>
        ou en query paramètre apiToken.
      parameters:
        - $ref: '#/components/parameters/ApiTokenQuery'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCardToLibraryRequest'
      responses:
        '201':
          description: Carte ajoutée à la bibliothèque
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryCardResponse'
        '400':
          description: Requête invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Bibliothèque ou carte introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Carte déjà présente dans la bibliothèque
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/me/library/cards/{cardId}:
    get:
      tags:
        - Library
      summary: Récupérer une carte de la bibliothèque connectée
      description: |
        Le token peut être fourni dans l'en-tête Authorization: Bearer <token>
        ou en query paramètre apiToken.
      parameters:
        - $ref: '#/components/parameters/ApiTokenQuery'
        - name: cardId
          in: path
          description: Identifiant de la carte
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Carte de la bibliothèque
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryCardResponse'
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Bibliothèque introuvable ou carte absente de la bibliothèque
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Library
      summary: Mettre à jour une carte de la bibliothèque connectée (favorite)
      description: |
        Met à jour les métadonnées de possession: numberCard et isFavorite.
        Le token peut être fourni dans l'en-tête Authorization: Bearer <token>
        ou en query paramètre apiToken.
      parameters:
        - $ref: '#/components/parameters/ApiTokenQuery'
        - name: cardId
          in: path
          description: Identifiant de la carte
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLibraryCardRequest'
      responses:
        '200':
          description: Carte de bibliothèque mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryCardResponse'
        '400':
          description: Requête invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Bibliothèque introuvable ou carte absente de la bibliothèque
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Library
      summary: Retirer une carte de la bibliothèque connectée
      description: |
        Le token peut être fourni dans l'en-tête Authorization: Bearer <token>
        ou en query paramètre apiToken.
      parameters:
        - $ref: '#/components/parameters/ApiTokenQuery'
        - name: cardId
          in: path
          description: Identifiant de la carte
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Carte retirée de la bibliothèque
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Bibliothèque introuvable ou carte absente de la bibliothèque
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/me/sets:
    get:
      tags:
        - Sets
      summary: Récupérer la liste des sets de l'utilisateur connecté
      description: |
        Le token peut être fourni dans l'en-tête Authorization: Bearer <token>
        ou en query paramètre apiToken.
      parameters:
        - $ref: '#/components/parameters/ApiTokenQuery'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des sets
          content:
            application/json:
              schema:
                type: object
                properties:
                  sets:
                    type: array
                    items:
                      $ref: '#/components/schemas/SetSummary'
    post:
      tags:
        - Sets
      summary: Créer un nouveau set pour l'utilisateur connecté
      description: |
        Le token peut être fourni dans l'en-tête Authorization: Bearer <token>
        ou en query paramètre apiToken.
      parameters:
        - $ref: '#/components/parameters/ApiTokenQuery'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSetRequest'
      responses:
        '201':
          description: Set créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetSummary'
        '400':
          description: Requête invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: GameType introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/me/sets/{setId}:
    get:
      tags:
        - Sets
      summary: Récupérer les cartes d'un set spécifique
      description: |
        Le token peut être fourni dans l'en-tête Authorization: Bearer <token>
        ou en query paramètre apiToken.
      parameters:
        - $ref: '#/components/parameters/ApiTokenQuery'
        - name: setId
          in: path
          description: Identifiant du set
          required: true
          schema:
            type: integer
        - name: page
          in: query
          description: Numéro de page pour la pagination des cartes
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste paginée des cartes du set
          content:
            application/json:
              schema:
                type: object
                properties:
                  cards:
                    type: array
                    items:
                      $ref: '#/components/schemas/CardResponse'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Accès refusé au set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Set introuvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Sets
      summary: Mettre à jour un set
      description: |
        Le token peut être fourni dans l'en-tête Authorization: Bearer <token>
        ou en query paramètre apiToken.
      parameters:
